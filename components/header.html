<!-- Header Component -->
<header>
    <nav>
        <div class="nav-container">
            <div class="nav-left">
                <a href="/pages/curriculum/index.html" class="nav-link">Curriculum</a>
                <a href="/pages/campus-map/index.html" class="nav-link">Campus Map</a>
                <a href="/pages/milestones/index.html" class="nav-link">Milestones</a>
                
            </div>
            <a href="/index.html" class="logo">
                <img src="/assets/icons/starkeep-logo.svg" alt="StarKeep Academy" class="logo-img">
            </a>
            <div class="nav-right">
                <a href="/pages/login/index.html" class="nav-btn">Login</a>
            </div>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
        <div class="mobile-menu">
            <a href="/pages/curriculum/index.html" class="nav-link">Curriculum</a>
            <a href="/pages/campus-map/index.html" class="nav-link">Campus Map</a>
            <a href="/pages/login/index.html" class="nav-link">Login</a>
        </div>
    </nav>
</header>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const header = document.querySelector('header');
    if (!header || header.hasAttribute('data-nav-initialized')) return;
    header.setAttribute('data-nav-initialized', 'true');

    const hamburger = header.querySelector('.hamburger');
    const mobileMenu = header.querySelector('.mobile-menu');

    if (hamburger && mobileMenu) {
        hamburger.addEventListener('click', function () {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        });
    }

    let lastScrollTop = 0;
    window.addEventListener('scroll', function () {
        if (window.innerWidth <= 768) return;
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        header.style.transform = scrollTop > lastScrollTop && scrollTop > 80
            ? 'translateY(-100%)'
            : 'translateY(0)';
        lastScrollTop = scrollTop;
    }, { passive: true });

    window.addEventListener('mousemove', function (e) {
        if (window.innerWidth <= 768) return;
        if (e.clientY <= 80) header.style.transform = 'translateY(0)';
    });
});
</script>
