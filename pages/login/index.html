<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — StarKeep Academy</title>
    <link rel="stylesheet" href="/assets/main.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="/assets/js/index.js" defer></script>
</head>
<body>
    <!-- THE HEADER -->
    <starkeep-header></starkeep-header>
    <!--            -->

    <main class="page-content">
        <section class="hero">
            <h1>Log In</h1>
            <p>Sign in to access your profile and manage your subscription.</p>

    <div id="loginArea" class="box">
        <p>Hint: Please use <strong>Username "admin"</strong> and <strong>Password "1234"</strong>.</p>

        <p>Username: <input type="text" value="" id="usernameInput"></p>
        <p id="error1"></p>

        <p>Password: <input type="text" value="" id="passwordInput"></p>
        <p id="error2"></p>

        <p id="success"></p>
        <p><input type="button" value="Sign In" id="loginButton"></p>
    </div>

    <div id="profileArea" class="box hidden">
    </div>

    <div id="subscriptionPopup" class="modal-background hidden">
    </div>

    </section>
    </main>
    <!-- THE FOOTER -->
    <starkeep-footer></starkeep-footer>
    <!--            -->

    <script src="script.js"></script>
</body>
</html>
