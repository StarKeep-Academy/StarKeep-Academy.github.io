<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum — StarKeep Academy</title>
    <link rel="stylesheet" href="/assets/main.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="/assets/js/index.js" defer></script>
</head>
<body>
    <!-- THE HEADER -->
    <starkeep-header></starkeep-header>
    <!--            -->

    <main class="page-content">
        <section class="hero">
            <h1>Curriculum</h1>
            <p>Choose your Heroic Path and generate your unique Constellation learning pathway.</p>

            <div class="path-selection-container">

            <div class="button-group" id="heroic-path-group">
                <button class="path-btn" data-path-id="1">
                    <svg viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="2">
                    <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="3">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="4">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="5">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="6">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                </div>

            <div class="divider"></div>

            <div class="button-group" id="learning-path-group">
                <button class="path-btn" data-path-id="7">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="8">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="9">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="10">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="11">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                <button class="path-btn" data-path-id="12">
                    <svg viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="#bbb" /></svg>
                </button>
                </div>
        </div>

        <div id="path-details" class="details-container">
            <div id="heroic-details" class="details-panel">
                <img id="heroic-image" src="" alt="">
                <p id="heroic-text"></p>
            </div>
            <div id="learning-details" class="details-panel">
                <img id="learning-image" src="" alt="">
                <p id="learning-text"></p>
            </div>
        </div>

        <button id="generate-btn" class="generate-btn" disabled>Generate</button>

        <div class="graph-placeholder">
            <img src="path_to_your_graph_image.png" alt="Graph Diagram">
        </div>
        </section>
    </main>
    <!-- THE FOOTER -->
    <starkeep-footer></starkeep-footer>
    <!--            -->

    <script src="script.js"></script>
</body>
</html>
